    <script>
    (function () {
      var SOCKET_BASE = 'wss://api.gamevault222.com';
      var NativeWS = window.WebSocket;
      function rewriteWsUrl(url) {
        if (typeof url !== 'string') return url;
        url = url.replace(/^wss:\/\/gamevault222\.com/i, SOCKET_BASE);
        url = url.replace(/^ws:\/\/gamevault222\.com/i, SOCKET_BASE.replace(/^wss/, 'ws'));
        url = url.replace(/\/ws\/user-session/i, '/ws/session');
        return url;
      }
      function PatchedWebSocket(url, protocols) {
        return new NativeWS(rewriteWsUrl(url), protocols);
      }
      PatchedWebSocket.prototype = NativeWS.prototype;
      PatchedWebSocket.CONNECTING = NativeWS.CONNECTING;
      PatchedWebSocket.OPEN = NativeWS.OPEN;
      PatchedWebSocket.CLOSING = NativeWS.CLOSING;
      PatchedWebSocket.CLOSED = NativeWS.CLOSED;
      window.WebSocket = PatchedWebSocket;
    })();

      /* ── iOS Safari fullscreen workaround ── */

      /* html element: enable scrolling before game starts */
      .ios-safari-fullscreen-workaround {
        --unity-height: 100dvh;
        overflow-y: auto !important;
        overflow-x: hidden !important;
        height: auto !important;
        -webkit-overflow-scrolling: touch;

        min-height: calc(var(--unity-height, 100dvh) + 80px) !important;
        overflow-y: auto !important;
        overflow-x: hidden !important;
        -webkit-overflow-scrolling: touch;
        height: auto !important;

        position: -webkit-sticky !important;
        position: sticky !important;
        top: 0 !important;
        left: 0 !important;

        height: var(--unity-height, 100dvh) !important;

      /* Prevent canvas from stealing touches before game starts */

        width: 100% !important;
        height: 100% !important;
        touch-action: none !important;
        pointer-events: none !important;

        display: block !important;

    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var warningBanner = document.querySelector("#unity-warning");

      var progressBarFull = document.querySelector("#unity-logo-fill");
      var progressText = document.querySelector("#unity-progress-text");
      var progressValueEl = progressText ? progressText.querySelector(".unity-progress-value") : null;
      var progressSpeedEl = progressText ? progressText.querySelector(".unity-progress-speed") : null;
      var _maintenanceActive = false;
      var buildVersion = "1778929172191";

      var supportsClipReveal = !!(
        window.CSS &&
        (CSS.supports("clip-path: inset(50% 0 0 0)") ||
         CSS.supports("-webkit-clip-path: inset(50% 0 0 0)"))
      );

      var UNITY_LOADER_MB = 0.35;
      var UNITY_DATA_MB = 18.9;
      var UNITY_FRAMEWORK_MB = 13.47;
      var UNITY_WASM_MB = 12.5;
      // Logo PNG letterboxing within the fill container (clip-path uses box, not art bounds).
      var LOGO_CLIP_TOP_EMPTY_PERCENT = 11;
      var LOGO_CLIP_BOTTOM_EMPTY_PERCENT = 6;
      var BUILD_ASSET_KEYS = ["loader", "data", "framework", "wasm"];
      var buildLoadTrackingStarted = false;
      var buildResourcePollId = null;
      var totalDownloadBytes = (UNITY_LOADER_MB + UNITY_DATA_MB + UNITY_FRAMEWORK_MB + UNITY_WASM_MB) * 1024 * 1024;
      var lastProgressTime = null;
      var lastProgressValue = 0;
      var currentDownloadSpeedBps = 0;

      function formatSpeed(bytesPerSecond) {
        if (!bytesPerSecond || bytesPerSecond < 0) return "";
        if (bytesPerSecond >= 1024 * 1024) return (bytesPerSecond / (1024 * 1024)).toFixed(2) + " MB/s";
        if (bytesPerSecond >= 1024) return (bytesPerSecond / 1024).toFixed(1) + " KB/s";
        return Math.round(bytesPerSecond) + " B/s";
      }

      // Unity WebGL loader reports download progress as 0..0.9 (see l(.9*...) in Builds.loader.js), then l(1) after init.
      // Map Unity loader callback only while network byte totals are unavailable.
      var UNITY_DOWNLOAD_PROGRESS_MAX = 0.9;
      // Real bytes → 0–90% UI; after all build files finish → smooth 90–100%; hide loader then show canvas.
      var UI_PROGRESS_DURING_DOWNLOAD_MAX = 0.9;
      var UI_NETWORK_COMPLETE_RATIO = 0.995;
      var LOADER_HOLD_AT_100_MS = 450;
      // Max UI progress increase per animation frame (prevents jumps to 100%).
      var UI_PROGRESS_MAX_STEP_PER_FRAME = 0.01;
      var UI_POST_DOWNLOAD_MAX_STEP_PER_FRAME = 0.0035;

      function mapUnityLoaderProgressToUi(unityProgress) {
        var p = Math.min(Math.max(unityProgress, 0), UNITY_DOWNLOAD_PROGRESS_MAX);
        return (p / UNITY_DOWNLOAD_PROGRESS_MAX) * UI_PROGRESS_DURING_DOWNLOAD_MAX;
      }

      // Real byte progress for all Build/ files (Unity's callback often hits 0.9 before wasm/loader finish).
      var unityAssetByteState = {
        loader: { loaded: 0, headerTotal: 0, done: false },
        data: { loaded: 0, headerTotal: 0, done: false },
        framework: { loaded: 0, headerTotal: 0, done: false },
        wasm: { loaded: 0, headerTotal: 0, done: false }
      };
      var UNITY_ASSET_FALLBACK_BYTES = {
        loader: UNITY_LOADER_MB * 1024 * 1024,
        data: UNITY_DATA_MB * 1024 * 1024,
        framework: UNITY_FRAMEWORK_MB * 1024 * 1024,
        wasm: UNITY_WASM_MB * 1024 * 1024
      };
      var lastNetworkBytesSum = 0;
      var lastNetworkSpeedTime = null;
      var _postDownloadPhase = false;
      var _unityInstanceReady = false;
      var _loaderHidden = false;
      var _loaderHideScheduled = false;
      var _loaderForceHideTimer = null;

      function unityMainAssetKeyFromPathname(pathname) {
        if (!pathname) return null;
        if (/Builds\.loader\.js/i.test(pathname)) return "loader";
        if (/Builds\.wasm/i.test(pathname)) return "wasm";
        if (/Builds\.framework\.js/i.test(pathname)) return "framework";
        if (/Builds\.data/i.test(pathname)) return "data";
        return null;
      }

      function unityMainAssetKeyFromUrl(urlStr) {
        if (!urlStr) return null;
        try {
          return unityMainAssetKeyFromPathname(new URL(urlStr, document.URL).pathname);
        } catch (e) {
          return null;
        }
      }

      function plannedAssetTotalBytes(key, st) {
        var fallback = UNITY_ASSET_FALLBACK_BYTES[key] || 0;
        var planned = Math.max(st.headerTotal, fallback);
        if (st.loaded > planned) planned = st.loaded;
        return planned;
      }

      function allBuildDownloadsComplete() {
        for (var i = 0; i < BUILD_ASSET_KEYS.length; i++) {
          var k = BUILD_ASSET_KEYS[i];
          var st = unityAssetByteState[k];
          if (!st.done) return false;
          var expected = plannedAssetTotalBytes(k, st);
          if (expected > 0 && st.loaded < expected * 0.995) return false;
        }
        return true;
      }

      function getUnityNetworkLoadedRatio() {
        if (!buildLoadTrackingStarted) return null;

        var loaded = 0;
        var total = 0;
        for (var i = 0; i < BUILD_ASSET_KEYS.length; i++) {
          var k = BUILD_ASSET_KEYS[i];
          var st = unityAssetByteState[k];
          loaded += st.loaded;
          total += plannedAssetTotalBytes(k, st);
        }
        if (total <= 0) return null;
        return Math.min(1, loaded / total);
      }

      function syncUnityAssetsFromResourceTiming() {
        if (!window.performance || !performance.getEntriesByType) return false;
        var entries = performance.getEntriesByType("resource");
        var touched = false;
        for (var i = 0; i < entries.length; i++) {
          var entry = entries[i];
          var key = unityMainAssetKeyFromUrl(entry.name);
          if (!key) continue;
          var st = unityAssetByteState[key];
          var wireSize = entry.transferSize > 0 ? entry.transferSize : 0;
          if (wireSize > 0) {
            st.headerTotal = Math.max(st.headerTotal, wireSize);
          } else if (entry.encodedBodySize > 0) {
            st.headerTotal = Math.max(st.headerTotal, entry.encodedBodySize);
          }
          if (entry.responseEnd > 0) {
            var size = wireSize || entry.encodedBodySize || 0;
            if (size > 0) {
              var planned = plannedAssetTotalBytes(key, st);
              if (planned > 0 && size > planned * 1.25) {
                size = st.loaded;
              }
              st.loaded = Math.max(st.loaded, size);
            }
            var expected = plannedAssetTotalBytes(key, st);
            if (expected > 0 && st.loaded >= expected * 0.995) {
              st.done = true;
            }
            touched = true;
          } else if (wireSize > 0) {
            st.loaded = Math.max(st.loaded, wireSize);
            touched = true;
          }
        }
        return touched;
      }

      function startBuildResourceTimingPoll() {
        if (buildResourcePollId != null) return;
        buildResourcePollId = setInterval(function () {
          if (syncUnityAssetsFromResourceTiming()) {
            notifyUnityMainAssetByteProgress();
          }
          if (allBuildDownloadsComplete() && buildResourcePollId != null) {
            clearInterval(buildResourcePollId);
            buildResourcePollId = null;
          }
        }, 80);
      }

      function updateNetworkDownloadSpeed(sumLoaded) {
        var now = performance.now() / 1000;
        if (lastNetworkSpeedTime != null && sumLoaded > lastNetworkBytesSum) {
          var dt = now - lastNetworkSpeedTime;
          if (dt > 0.15) {
            currentDownloadSpeedBps = (sumLoaded - lastNetworkBytesSum) / dt;
            lastNetworkBytesSum = sumLoaded;
            lastNetworkSpeedTime = now;
          }
        } else if (lastNetworkSpeedTime == null) {
          lastNetworkBytesSum = sumLoaded;
          lastNetworkSpeedTime = now;
        }
      }

      function notifyUnityMainAssetByteProgress() {
        syncUnityAssetsFromResourceTiming();
        var sumL = 0;
        for (var j = 0; j < BUILD_ASSET_KEYS.length; j++) {
          sumL += unityAssetByteState[BUILD_ASSET_KEYS[j]].loaded;
        }
        updateNetworkDownloadSpeed(sumL);
        pushLoaderProgressFromNetworkIfNeeded();
      }

      function wrapUnityMainAssetResponseBody(assetKey, res) {
        if (!res || !res.body || typeof res.body.getReader !== "function") return res;
        var st = unityAssetByteState[assetKey];
        var cl = parseInt(res.headers.get("Content-Length") || "0", 10) || 0;
        if (cl > 0) st.headerTotal = cl;

        var reader = res.body.getReader();
        var monitored = new ReadableStream({
          pull: function (controller) {
            return reader.read().then(function (chunk) {
              if (chunk.done) {
                st.done = true;
                if (st.headerTotal > 0) st.loaded = Math.max(st.loaded, st.headerTotal);
                else if (st.loaded > 0) st.headerTotal = st.loaded;
                notifyUnityMainAssetByteProgress();
                controller.close();
                return;
              }
              if (chunk.value && chunk.value.byteLength) st.loaded += chunk.value.byteLength;
              notifyUnityMainAssetByteProgress();
              controller.enqueue(chunk.value);
            });
          },
          cancel: function (reason) {
            return reader.cancel(reason);
          }
        });

        try {

        try {
          var encrypted = localStorage.getItem('unityTokenEncrypted');
          if (encrypted) return decryptToken(encrypted);
        } catch (e) {}
        return null;
      }

      function clearStoredToken() {
        try {
          localStorage.removeItem('unityTokenEncrypted');
          localStorage.removeItem('unityTokenTimestamp');
        } catch (e) {}
      }

      function onTokenReceived(token) {
        storeEncryptedToken(token);
      }

      function getToken() {
        return getStoredToken();
      }

      function onLoginStatusChanged(isSuccess) {
        if (typeof isSuccess === 'string') {
          isLoggedIn = isSuccess.toLowerCase() === 'true';
        } else {
          isLoggedIn = !!isSuccess;
        }
        if (!isLoggedIn) {
          clearStoredToken();
        }
        if (typeof updateFullscreenHintVisibility === 'function') {
          updateFullscreenHintVisibility();
        }
      }

      window.onLoginStatusChanged = onLoginStatusChanged;
      window.onTokenReceived = onTokenReceived;
      window.getToken = getToken;
      window.clearStoredToken = clearStoredToken;

      var loaderFsHint = document.getElementById("loader-fs-hint");
      var __fsHintVisible = false;

      var _unityLoaded = false;

      function isMobileUA() {
        return /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
          || (navigator.maxTouchPoints > 1 && /MacIntel/i.test(navigator.platform));
      }

      function showLoaderFsHint() {
        if (!loaderFsHint) return;
        if (_maintenanceActive) return;
        if (isFullscreen()) return;
        if (isIOSStandalone) return;
        if (isIOSSafari) return;

        var actionWord = isMobileUA() ? 'Tap' : 'Click';
        var hintText = document.getElementById("loader-fs-hint-text");
        if (hintText) {
          hintText.innerHTML = '<span class="hint-tap">' + actionWord + '</span> <span class="hint-normal">anywhere for</span> <span class="hint-fs">Fullscreen</span>';
        }

        __fsHintVisible = true;
        loaderFsHint.classList.add('show');
      }

      function hideLoaderFsHint() {
        if (loaderFsHint) loaderFsHint.classList.remove('show');
        __fsHintVisible = false;
      }

      function updateFullscreenHintVisibility() {
        if (isFullscreen()) {
          hideLoaderFsHint();
        } else if (_unityLoaded) {
          showLoaderFsHint();
        }
      }

      document.addEventListener('fullscreenchange', updateFullscreenHintVisibility);
      document.addEventListener('webkitfullscreenchange', updateFullscreenHintVisibility);
      document.addEventListener('mozfullscreenchange', updateFullscreenHintVisibility);
      document.addEventListener('MSFullscreenChange', updateFullscreenHintVisibility);

      setTimeout(showLoaderFsHint, 300);

      var rotateOverlay = document.getElementById("rotate-device");

      function setVh() {
        document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
      }

      function checkOrientation() {
        setVh();
        var isMobileDevice =
          (navigator.userAgentData && navigator.userAgentData.mobile === true) ||
          /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
          (navigator.maxTouchPoints && navigator.maxTouchPoints > 1 && /MacIntel/i.test(navigator.platform));

        if (_maintenanceActive) return;
        if (isMobileDevice && window.innerHeight > window.innerWidth) {
          rotateOverlay.classList.add("show");
          if (loaderFsHint) loaderFsHint.classList.remove("show");
          hideLoaderFsHint();
          container.style.visibility = "hidden";
          var iosHnt = document.getElementById('ios-swipe-hint');
          if (iosHnt) iosHnt.classList.remove('show');
        } else {
          rotateOverlay.classList.remove("show");
          container.style.visibility = "visible";
          if (isIOSSafari && !isIOSStandalone) {
            _iosGameStarted = false;
            document.documentElement.classList.remove('ios-game-started');
            document.documentElement.classList.add('ios-safari-fullscreen-workaround');
            unlockLoaderInput();
            if (typeof preventScroll === 'function') {
              document.removeEventListener('touchmove', preventScroll);
              document.removeEventListener('wheel', preventScroll);
            }
            var iosHnt2 = document.getElementById('ios-swipe-hint');
            if (iosHnt2) iosHnt2.classList.add('show');
          }
          try { showLoaderFsHint(); } catch (e) {}
        }
      }

      window.addEventListener("resize", checkOrientation);
      window.addEventListener("orientationchange", checkOrientation);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", checkOrientation);
      }
      checkOrientation();

      function getApiBase() {
        if (window.CASINO_API_BASE) return window.CASINO_API_BASE;
        var metaEl = document.querySelector('meta[name="casino-api-base"]');
        if (metaEl && metaEl.content) return metaEl.content;
        //return 'https://gamevault222.com';
        return 'http://localhost:5036';
      }

      var MAINTENANCE_HTML_KEY = 'casino-maintenance-html';
      var MAINTENANCE_VERSION_KEY = 'casino-maintenance-html-version';

      function removeLegacyMaintenanceCache() {
        try {
          var keysToRemove = [];
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (!k) continue;
            if (k === MAINTENANCE_HTML_KEY || k === MAINTENANCE_VERSION_KEY) continue;
            if (/^casino-maintenance-html/.test(k)) keysToRemove.push(k);
          }
          keysToRemove.forEach(function (k) { localStorage.removeItem(k); });
        } catch (e) {}
      }

      function cacheMaintenanceHtml(html) {
        try {
          localStorage.setItem(MAINTENANCE_HTML_KEY, html);
          localStorage.setItem(MAINTENANCE_VERSION_KEY, buildVersion);
          removeLegacyMaintenanceCache();
        } catch (e) {}
      }

      function clearMaintenanceHtmlCache() {
        try {
          localStorage.removeItem(MAINTENANCE_HTML_KEY);
          localStorage.removeItem(MAINTENANCE_VERSION_KEY);
          removeLegacyMaintenanceCache();
        } catch (e) {}
      }

      function getCachedMaintenanceHtml() {
        try {
          var cachedVersion = localStorage.getItem(MAINTENANCE_VERSION_KEY);
          if (cachedVersion !== buildVersion) {
            clearMaintenanceHtmlCache();
            return null;
          }
          return localStorage.getItem(MAINTENANCE_HTML_KEY);
        } catch (e) {
          return null;
        }
      }

      function writeMaintenanceDocument(html) {
        cacheMaintenanceHtml(html);
        document.open();
        document.write(html);
        document.close();
      }

      function fetchMaintenanceHtml() {
        var bust = encodeURIComponent(buildVersion);
        return fetch('maintenance.html?v=' + bust, {
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache' }
        }).then(function (res) {
          if (!res.ok) throw new Error('maintenance.html ' + res.status);
          return res.text();
        }).catch(function () {
          return fetch('/casino-maintenance.html?v=' + bust, {
            cache: 'no-store',
            headers: { 'Cache-Control': 'no-cache' }
          }).then(function (res) {
            if (!res.ok) throw new Error('casino-maintenance.html ' + res.status);
            return res.text();
          });
        });
      }

      function loadMaintenanceHtml() {
        return fetchMaintenanceHtml().then(function (html) {
          cacheMaintenanceHtml(html);
          return html;
        }).catch(function () {
          var cached = getCachedMaintenanceHtml();
          if (cached) return cached;
          throw new Error('no maintenance html');
        });
      }

      function prefetchMaintenanceHtml() {
        fetchMaintenanceHtml().then(function (html) {
          cacheMaintenanceHtml(html);
        }).catch(function () {});
      }

      function showCasinoMaintenancePage() {
        _maintenanceActive = true;
        loadingBar.style.display = 'none';
        container.style.display = 'none';
        if (typeof rotateOverlay !== 'undefined' && rotateOverlay) rotateOverlay.classList.remove('show');
        hideLoaderFsHint();
        var iosHnt = document.getElementById('ios-swipe-hint');
        if (iosHnt) iosHnt.classList.remove('show');
        document.documentElement.classList.remove('ios-safari-fullscreen-workaround');

        if (isFullscreen()) {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
          else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
          else if (document.msExitFullscreen) document.msExitFullscreen();
        }

        loadMaintenanceHtml().then(writeMaintenanceDocument).catch(function () {
          var cached = getCachedMaintenanceHtml();
          if (cached) {
            writeMaintenanceDocument(cached);
            return;
          }
          writeMaintenanceDocument(
            '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>' +
            '<title>Game Vault — maintenance</title>' +
            '<style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;' +
            'background:#12051f;padding:1rem}.w{max-width:32rem;text-align:center}' +
            '.l img{width:min(42vw,320px);min-width:140px;height:auto}' +
            '.p img{width:min(94vw,32rem);height:auto;display:block;margin-top:.5rem}' +
            '</style></head><body><div class="w"><div class="l"><img src="TemplateData/unity-logo-light.png" ' +
            'alt="Game Vault 2.0"/></div><div class="p"><img src="TemplateData/Under-Maintanence.png" ' +
            'alt="Game is currently under maintenance"/></div></div></body></html>'
          );
        });
      }

      function parseMaintenanceRows(json) {
        if (Array.isArray(json)) return json;
        if (json && typeof json === 'object') {
          var rows = json.data || json.items || json.rows || json.result || json.value;
          if (Array.isArray(rows)) return rows;
        }
        return null;
      }

      function isMaintenanceRowActive(row) {
        if (!row || typeof row !== 'object') return false;

        var startRaw = row.start_time || row.startTime || row.StartTime;
        var endRaw = row.end_time || row.endTime || row.EndTime;
        if (startRaw == null || startRaw === '') return false;

        var startDate = new Date(startRaw);
        if (isNaN(startDate.getTime())) return false;
        if (Date.now() < startDate.getTime()) return false;

        if (endRaw == null || endRaw === '') return true;

        var endDate = new Date(endRaw);
        if (isNaN(endDate.getTime())) return true;
        return Date.now() < endDate.getTime();
      }

      function isCasinoMaintenanceActive(json) {
        var rows = parseMaintenanceRows(json);
        if (!rows) return false;

        for (var i = 0; i < rows.length; i++) {
          var r = rows[i];
          var mtype = r.maintenance_type || r.maintenanceType || r.MaintenanceType || '';
          if (!/^(backend|games?)$/i.test(String(mtype).trim())) continue;
          if (isMaintenanceRowActive(r)) return true;
        }
        return false;
      }

      function checkMaintenance() {
        var base = getApiBase();
        var cacheBust = '_cb=' + Date.now();

        fetch(base + '/api/maintenance?' + cacheBust, {
          method: 'GET',
          headers: {
            'Accept': 'application/json',
            'Cache-Control': 'no-cache',
            'Pragma': 'no-cache'
          },
          cache: 'no-store',
          mode: 'cors',
          credentials: 'omit'
        }).then(function (res) {
          if (res.status !== 200) {
            showCasinoMaintenancePage();
            return;
          }
          return res.json().then(function (json) {
            if (isCasinoMaintenanceActive(json)) {
              showCasinoMaintenancePage();
            } else {
              startUnityGame();
            }
          }).catch(function () {
            showCasinoMaintenancePage();
          });
        }).catch(function () {
          showCasinoMaintenancePage();
        });
      }

      prefetchMaintenanceHtml();
      checkMaintenance();

    </script>
  </body>
</html>
