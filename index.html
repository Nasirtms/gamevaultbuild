    <style>
      #loader-fs-hint {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        z-index: 99997;
        display: none;
        flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; padding: 24px;
        background: rgba(8, 4, 20, 0.55);
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        pointer-events: none;
        user-select: none; -webkit-user-select: none;
      }
      #loader-fs-hint.show {
        display: flex;
        animation: loaderHintFadeIn 0.45s ease-out;
      }
      .loader-hint-card {
        display: flex; flex-direction: column; align-items: center; gap: 16px;
        padding: 28px 38px;
        border-radius: 22px;
        background: rgba(20, 10, 40, 0.6);
        border: 1px solid rgba(140, 100, 255, 0.3);
        box-shadow: 0 0 30px rgba(100, 60, 200, 0.2), 0 12px 40px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      .loader-hint-icon {
        width: 56px; height: 56px;
        position: relative; display: flex; align-items: center; justify-content: center;
      }
      .tap-circle {
        width: 46px; height: 46px; border-radius: 50%;
        border: 2.5px solid rgba(120, 200, 255, 0.7);
        position: relative;
        animation: loaderTapPulse 1.6s ease-in-out infinite;
        box-shadow: 0 0 14px rgba(100, 180, 255, 0.3);
      }
      .tap-circle::after {
        content: '';
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 12px; height: 12px; border-radius: 50%;
        background: linear-gradient(135deg, #78c8ff, #a78bfa);
        box-shadow: 0 0 10px rgba(120, 200, 255, 0.5);
      }
      .loader-hint-text {
        font-family: "Trebuchet MS", "Segoe UI", Tahoma, Geneva, sans-serif;
        font-size: 16px; font-weight: 700; letter-spacing: 0.5px;
        text-align: center; line-height: 1.4;
      }
      .hint-tap { color: #78c8ff; text-shadow: 0 0 8px rgba(100, 180, 255, 0.5); }
      .hint-fs { color: #a78bfa; text-shadow: 0 0 8px rgba(167, 139, 250, 0.5); }
      .hint-normal { color: rgba(255, 255, 255, 0.9); }
      @keyframes loaderTapPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.6; }
      }
      @keyframes loaderHintFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      #rotate-device {
        position: fixed !important; top: 0 !important; left: 0 !important;
        width: 100vw !important; height: calc(var(--vh, 1vh) * 100) !important;
        background: radial-gradient(ellipse at 50% 40%, rgba(30, 15, 60, 0.95), rgba(8, 4, 18, 0.98)) !important;
        color: #fff !important;
        display: none !important;
        justify-content: center !important; align-items: center !important;
        z-index: 99999 !important;
        backdrop-filter: blur(12px) !important; -webkit-backdrop-filter: blur(12px) !important;
      }
      #rotate-device.show {
        display: flex !important;
        animation: rotateFadeIn 0.5s ease-out;
      }
      .rotate-content {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 24px; padding: 36px 44px;
        max-width: min(420px, 92vw); text-align: center;
        background: rgba(20, 10, 45, 0.5);
        border-radius: 24px;
        border: 1px solid rgba(120, 80, 220, 0.25);
        box-shadow: 0 0 40px rgba(100, 60, 200, 0.15), 0 16px 48px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      .rotate-text {
        font-family: 'Rajdhani', Arial, sans-serif;
        font-size: 20px; font-weight: 600; line-height: 1.3;
        letter-spacing: 2px; text-transform: uppercase;
        user-select: none;
        background: linear-gradient(135deg, #ffffff 0%, #78c8ff 30%, #a78bfa 50%, #78c8ff 70%, #ffffff 100%);
        background-size: 200% auto;
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: rotateTextShimmer 3s linear infinite;
      }
      .rotate-icon {
        width: 100px; height: 100px; position: relative;
        display: grid; place-items: center;
        animation: rotateDeviceWiggle 1.35s ease-in-out infinite;
      }
      .phone {
        width: 48px; height: 76px;
        border: 2.5px solid rgba(120, 200, 255, 0.8); border-radius: 11px;
        background: rgba(120, 200, 255, 0.05);
        box-shadow: 0 0 20px rgba(120, 200, 255, 0.15), 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 0 12px rgba(120, 200, 255, 0.05);
        position: relative;
      }
      .phone::before {
        content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
        width: 18px; height: 3px; border-radius: 999px;
        background: linear-gradient(90deg, rgba(120, 200, 255, 0.6), rgba(167, 139, 250, 0.6));
      }
      .phone::after {
        content: ''; position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%);
        width: 9px; height: 9px; border-radius: 50%;
        border: 2px solid rgba(167, 139, 250, 0.5);
        box-shadow: 0 0 6px rgba(167, 139, 250, 0.3);
      }
      .hint-arrow {
        position: absolute; inset: 0; border-radius: 999px;
        border: 2.5px dashed rgba(120, 200, 255, 0.2);
        animation: hintArrowPulse 2s ease-in-out infinite;
      }
      @keyframes rotateDeviceWiggle {
        0%   { transform: rotate(0deg); }
        25%  { transform: rotate(0deg); }
        55%  { transform: rotate(90deg); }
        80%  { transform: rotate(90deg); }
        100% { transform: rotate(0deg); }
      }
      @keyframes hintArrowPulse {
        0%, 100% { opacity: 0.4; border-color: rgba(120, 200, 255, 0.2); }
        50%      { opacity: 1; border-color: rgba(167, 139, 250, 0.35); }
      }
      @keyframes rotateTextShimmer {
        0%   { background-position: 200% center; }
        100% { background-position: -200% center; }
      }
      @keyframes rotateFadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .rotate-icon { animation: none; }
        .hint-arrow { animation: none; }
        .rotate-text { animation: none; }
      }

      /* ── iOS Safari fullscreen workaround ── */

      /* html element: enable scrolling before game starts */
      .ios-safari-fullscreen-workaround {
        --unity-height: 100dvh;
        overflow-y: auto !important;
        overflow-x: hidden !important;
        height: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      .ios-safari-fullscreen-workaround body {
        min-height: calc(var(--unity-height, 100dvh) + 80px) !important;
        overflow-y: auto !important;
        overflow-x: hidden !important;
        -webkit-overflow-scrolling: touch;
        height: auto !important;
      }

      .ios-safari-fullscreen-workaround #unity-container {
        position: -webkit-sticky !important;
        position: sticky !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: var(--unity-height, 100dvh) !important;
      }

      /* Prevent canvas from stealing touches before game starts */
      .ios-safari-fullscreen-workaround #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        touch-action: none !important;
        pointer-events: none !important;
      }

      /* Scroll spacer: provides the extra scrollable area below the sticky container */
      #ios-scroll-spacer {
        display: none;
      }
      .ios-safari-fullscreen-workaround #ios-scroll-spacer {
        display: block !important;
        width: 100%;
        height: 90px;
      }

      /* After Start Game: lock scroll, fix container, restore touch on canvas */
      .ios-safari-fullscreen-workaround.ios-game-started {
        overflow: hidden !important;
        height: var(--unity-height, 100dvh) !important;
      }

      .ios-safari-fullscreen-workaround.ios-game-started body {
        min-height: var(--unity-height, 100dvh) !important;
        overflow: hidden !important;
        height: var(--unity-height, 100dvh) !important;
      }

      .ios-safari-fullscreen-workaround.ios-game-started #unity-container {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: var(--unity-height, 100dvh) !important;
      }

      .ios-safari-fullscreen-workaround.ios-game-started #unity-canvas {
        touch-action: auto !important;
        pointer-events: auto !important;
      }

      .ios-safari-fullscreen-workaround.ios-game-started #ios-scroll-spacer {
        display: none !important;
      }

      /* iOS Safari swipe hint — fullscreen blur overlay */
      #ios-swipe-hint {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 100001;
        flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px;
        background: rgba(8, 4, 20, 0.6);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        pointer-events: none;
        user-select: none; -webkit-user-select: none;
      }
      #ios-swipe-hint.show {
        display: flex;
        animation: iosSwipeHintIn 0.5s ease-out;
      }
      #ios-swipe-hint .swipe-icon-circle {
        width: 56px; height: 56px;
        border-radius: 50%;
        border: 2.5px solid rgba(120, 200, 255, 0.6);
        display: flex; align-items: center; justify-content: center;
        animation: iosSwipePulse 1.6s ease-in-out infinite;
        box-shadow: 0 0 14px rgba(100, 180, 255, 0.25);
      }
      #ios-swipe-hint .swipe-icon-circle .swipe-arrow {
        font-size: 26px; line-height: 1;
        color: #78c8ff;
        animation: iosSwipeArrow 1.2s ease-in-out infinite;
      }
      #ios-swipe-hint .swipe-text {
        font-family: 'Rajdhani', 'Trebuchet MS', sans-serif;
        font-size: 17px; font-weight: 700;
        letter-spacing: 1.5px; text-transform: uppercase;
        text-align: center; line-height: 1.4;
      }
      #ios-swipe-hint .swipe-text .sw-action {
        color: #78c8ff;
        text-shadow: 0 0 8px rgba(100, 180, 255, 0.5);
      }
      #ios-swipe-hint .swipe-text .sw-label {
        color: rgba(255, 255, 255, 0.9);
      }
      #ios-swipe-hint .swipe-text .sw-target {
        color: #a78bfa;
        text-shadow: 0 0 8px rgba(167, 139, 250, 0.5);
      }
      @keyframes iosSwipeHintIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes iosSwipeArrow {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-6px); }
      }
      @keyframes iosSwipePulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%      { transform: scale(1.12); opacity: 0.6; }
      }


    </style>

  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo-fill-container">
          <div id="unity-logo-base"></div>
          <div id="unity-logo-fill"></div>
        </div>
        <div id="unity-progress-divider"></div>
        <div id="unity-progress-text">
          <div class="unity-progress-line">
            <span class="unity-progress-label">LOADING</span>
            <span class="unity-progress-value">0%</span>
          </div>
          <div class="unity-progress-speed">Est. speed: calculating...</div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>

    <div id="ios-scroll-spacer"></div>

    <div id="loader-fs-hint">
      <div class="loader-hint-card">
        <div class="loader-hint-icon" aria-hidden="true">
          <div class="tap-circle"></div>
        </div>
        <div class="loader-hint-text" id="loader-fs-hint-text">
          <span class="hint-tap">Tap</span>
          <span class="hint-normal">anywhere for</span>
          <span class="hint-fs">Fullscreen</span>
        </div>
      </div>
    </div>

    <div id="rotate-device">
      <div class="rotate-content" role="status" aria-live="polite" aria-label="Rotate device instruction">
        <div class="rotate-icon" aria-hidden="true">
          <div class="hint-arrow"></div>
          <div class="phone"></div>
        </div>
        <div class="rotate-text">Please rotate your device</div>
      </div>
    </div>

    <div id="ios-swipe-hint">
      <div class="swipe-icon-circle"><span class="swipe-arrow">&#8593;</span></div>
      <div class="swipe-text">
        <span class="sw-action">Swipe up</span>
        <span class="sw-label">for</span>
        <span class="sw-target">Fullscreen</span>
      </div>
    </div>

    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var warningBanner = document.querySelector("#unity-warning");

      var logoFill = document.querySelector("#unity-logo-fill");
      var progressLabel = document.querySelector(".unity-progress-label");
      var progressValue = document.querySelector(".unity-progress-value");
      var progressSpeed = document.querySelector(".unity-progress-speed");
      var _maintenanceActive = false;
      var buildVersion = "1778929172191";

      var currentDownloadSpeedBps = 0;
      var lastByteProgressTime = 0;
      var lastByteProgressLoaded = 0;
      var _buildFetchTrackerInstalled = false;
      var _nativeFetch = window.fetch.bind(window);
      var _unityEngineStarting = false;

      var BUILD_DOWNLOAD_ASSETS = [
        { key: 'data', suffix: 'Builds.data.unityweb', fallbackSize: 21249656 },
        { key: 'framework', suffix: 'Builds.framework.js.unityweb', fallbackSize: 92578 },
        { key: 'wasm', suffix: 'Builds.wasm.unityweb', fallbackSize: 14366140 }
      ];

      var buildDownloads = {};
      BUILD_DOWNLOAD_ASSETS.forEach(function (asset) {
        buildDownloads[asset.key] = {
          loaded: 0,
          total: asset.fallbackSize,
          done: false,
          activeFetches: 0
        };
      });

      function formatSpeed(bytesPerSecond) {
        if (bytesPerSecond <= 0) return '';
        if (bytesPerSecond >= 1048576) return (bytesPerSecond / 1048576).toFixed(1) + ' MB/s';
        if (bytesPerSecond >= 1024) return (bytesPerSecond / 1024).toFixed(0) + ' KB/s';
        return bytesPerSecond.toFixed(0) + ' B/s';
      }

      function matchBuildDownloadKey(url) {
        try {
          var path = new URL(url, document.URL).pathname;
          for (var i = 0; i < BUILD_DOWNLOAD_ASSETS.length; i++) {
            if (path.endsWith(BUILD_DOWNLOAD_ASSETS[i].suffix)) {
              return BUILD_DOWNLOAD_ASSETS[i].key;
            }
          }
        } catch (e) {}
        return null;
      }

      function getBuildDownloadTotals() {
        var loaded = 0;
        var total = 0;
        var allDone = true;
        for (var i = 0; i < BUILD_DOWNLOAD_ASSETS.length; i++) {
          var key = BUILD_DOWNLOAD_ASSETS[i].key;
          var file = buildDownloads[key];
          var fileTotal = file.total > 0 ? file.total : BUILD_DOWNLOAD_ASSETS[i].fallbackSize;
          var fileLoaded = file.done ? fileTotal : Math.min(file.loaded, fileTotal);
          loaded += fileLoaded;
          total += fileTotal;
          if (!file.done) allDone = false;
        }
        return { loaded: loaded, total: total, allDone: allDone };
      }

      function getByteDownloadRatio() {
        var totals = getBuildDownloadTotals();
        if (totals.total <= 0) return 0;
        var ratio = totals.loaded / totals.total;
        if (!totals.allDone) {
          return Math.min(ratio, 0.9999);
        }
        return 1;
      }

      var loaderProgress = {
        displayRatio: 0,

        apply: function () {
          var ratio = this.displayRatio;
          var revealPct = 100 - (ratio * 100);
          logoFill.style.clipPath = 'inset(0 ' + revealPct + '% 0 0)';
          logoFill.style.webkitClipPath = 'inset(0 ' + revealPct + '% 0 0)';
          progressValue.textContent = (ratio * 100).toFixed(2) + '%';
          if (currentDownloadSpeedBps > 0 && ratio < 1) {
            progressSpeed.textContent = 'Est. speed: ' + formatSpeed(currentDownloadSpeedBps);
          } else {
            progressSpeed.textContent = '';
          }
        },

        updateFromBytes: function () {
          var totals = getBuildDownloadTotals();
          var now = performance.now();
          if (lastByteProgressTime > 0 && totals.loaded > lastByteProgressLoaded) {
            var elapsed = (now - lastByteProgressTime) / 1000;
            if (elapsed > 0) {
              currentDownloadSpeedBps = (totals.loaded - lastByteProgressLoaded) / elapsed;
            }
          }
          lastByteProgressTime = now;
          lastByteProgressLoaded = totals.loaded;

          this.displayRatio = getByteDownloadRatio();
          if (_unityEngineStarting && totals.allDone) {
            progressLabel.textContent = 'Starting...';
          } else {
            progressLabel.textContent = 'LOADING';
          }
          this.apply();
        },

        setComplete: function () {
          this.displayRatio = 1;
          this.apply();
        },

        reset: function () {
          this.displayRatio = 0;
          lastByteProgressTime = 0;
          lastByteProgressLoaded = 0;
          currentDownloadSpeedBps = 0;
          _unityEngineStarting = false;
          BUILD_DOWNLOAD_ASSETS.forEach(function (asset) {
            buildDownloads[asset.key].loaded = 0;
            buildDownloads[asset.key].done = false;
            buildDownloads[asset.key].activeFetches = 0;
          });
          this.apply();
        }
      };

      function estimateCompressedTotal(response, fallbackTotal) {
        var headerTotal = parseInt(response.headers.get('Content-Length') || '0', 10);
        if (headerTotal > 0) return headerTotal;
        var encoding = response.headers.get('Content-Encoding');
        if (encoding === 'br' && fallbackTotal > 0) {
          return Math.min(Math.round(fallbackTotal * 0.45), 536870912);
        }
        if (encoding === 'gzip' && fallbackTotal > 0) {
          return Math.min(Math.round(fallbackTotal * 0.35), 536870912);
        }
        return fallbackTotal;
      }

      function trackBuildResponseBody(key, response) {
        var file = buildDownloads[key];
        var asset = BUILD_DOWNLOAD_ASSETS.filter(function (a) { return a.key === key; })[0];
        var fallbackTotal = asset ? asset.fallbackSize : 0;
        var expectedTotal = estimateCompressedTotal(response, fallbackTotal);
        if (expectedTotal > 0) {
          file.total = expectedTotal;
        }

        if (!response.body) {
          file.loaded = file.total;
          file.done = true;
          file.activeFetches = Math.max(0, file.activeFetches - 1);
          loaderProgress.updateFromBytes();
          return response;
        }

        var reader = response.body.getReader();
        var stream = new ReadableStream({
          start: function (controller) {
            function pump() {
              return reader.read().then(function (result) {
                if (result.done) {
                  file.loaded = file.total > 0 ? file.total : file.loaded;
                  file.done = true;
                  file.activeFetches = Math.max(0, file.activeFetches - 1);
                  loaderProgress.updateFromBytes();
                  controller.close();
                  return;
                }
                file.loaded += result.value.byteLength;
                if (file.total > 0 && file.loaded > file.total) {
                  file.total = file.loaded;
                }
                loaderProgress.updateFromBytes();
                controller.enqueue(result.value);
                return pump();
              }).catch(function (err) {
                file.activeFetches = Math.max(0, file.activeFetches - 1);
                controller.error(err);
                throw err;
              });
            }
            return pump();
          }
        });

        return new Response(stream, {
          status: response.status,
          statusText: response.statusText,
          headers: response.headers
        });
      }

      function installBuildDownloadTracker() {
        if (_buildFetchTrackerInstalled) return;
        _buildFetchTrackerInstalled = true;
        window.fetch = function (input, init) {
          var reqUrl = typeof input === 'string' ? input : (input && input.url ? input.url : '');
          var method = (init && init.method) || (input && input.method) || 'GET';
          var key = matchBuildDownloadKey(reqUrl);
          if (!key || method.toUpperCase() !== 'GET') {
            return _nativeFetch(input, init);
          }

          var file = buildDownloads[key];
          file.loaded = 0;
          file.activeFetches += 1;
          file.done = false;

          return _nativeFetch(input, init).then(function (response) {
            if (!response || !response.ok) {
              file.activeFetches = Math.max(0, file.activeFetches - 1);
              return response;
            }
            return trackBuildResponseBody(key, response);
          }).catch(function (err) {
            file.activeFetches = Math.max(0, file.activeFetches - 1);
            throw err;
          });
        };
      }

      function checkCachedBuildFiles() {
        if (!window.caches) return Promise.resolve();
        var cacheName = 'UnityCache_' + config.companyName + '_' + config.productName;
        return caches.open(cacheName).then(function (cache) {
          return Promise.all(BUILD_DOWNLOAD_ASSETS.map(function (asset) {
            var url = new URL(buildUrl + '/' + asset.suffix + buildQuery, document.URL).href;
            return cache.match(url).then(function (response) {
              if (!response) return;
              var size = parseInt(response.headers.get('Content-Length') || '0', 10);
              if (size <= 0) size = asset.fallbackSize;
              var file = buildDownloads[asset.key];
              file.total = size;
              file.loaded = size;
              file.done = true;
            });
          }));
        }).catch(function () {});
      }

      function probeBuildFileSizes() {
        return Promise.all(BUILD_DOWNLOAD_ASSETS.map(function (asset) {
          var url = buildUrl + '/' + asset.suffix + buildQuery;
          return _nativeFetch(url, { method: 'HEAD', cache: 'no-cache' }).then(function (response) {
            if (!response.ok) return;
            var size = parseInt(response.headers.get('Content-Length') || '0', 10);
            if (size > 0) {
              buildDownloads[asset.key].total = size;
            }
          }).catch(function () {});
        })).then(function () {
          return checkCachedBuildFiles();
        }).then(function () {
          loaderProgress.updateFromBytes();
        });
      }

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var buildQuery = "?v=" + buildVersion;
      var loaderUrl = buildUrl + "/Builds.loader.js" + buildQuery;
      var config = {

        return false;
      }

      function checkMaintenance() {
        var base = getApiBase();
        var cacheBust = '_cb=' + Date.now();

        fetch(base + '/api/maintenance?' + cacheBust, {
          method: 'GET',
          headers: {
            'Accept': 'application/json',
            'Cache-Control': 'no-cache',
            'Pragma': 'no-cache'
          },
          cache: 'no-store',
          mode: 'cors',
          credentials: 'omit'
        }).then(function (res) {
          if (res.status !== 200) {
            showCasinoMaintenancePage();
            return;
          }
          return res.json().then(function (json) {
            if (isCasinoMaintenanceActive(json)) {
              showCasinoMaintenancePage();
            } else {
              startUnityGame();
            }
          }).catch(function () {
            showCasinoMaintenancePage();
          });
        }).catch(function () {
          showCasinoMaintenancePage();
        });
      }

      prefetchMaintenanceHtml();
      checkMaintenance();

    </script>
  </body>
</html>
